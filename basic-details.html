<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEDI-I | Your Health Profile</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0077b6;
            --accent: #d32f2f;
            --bg: #f8fbff;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #f8fbff 0%, #eef6ff 100%);
        }

        .details-section {
            padding: 80px 20px;
            display: flex;
            justify-content: center;
        }

        .details-container {
            background: white;
            max-width: 800px;
            width: 100%;
            padding: 50px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            border: 1px solid #f0f0f0;
        }

        .form-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .form-header h2 {
            font-size: 36px;
            font-weight: 800;
            color: #1a1a1a;
            margin-bottom: 10px;
        }

        .form-header p {
            color: #666;
            font-size: 16px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-weight: 600;
            font-size: 14px;
            color: #444;
            margin-left: 5px;
        }

        .input-group input, .input-group select {
            padding: 14px 18px;
            border: 2px solid #f0f0f0;
            border-radius: 12px;
            font-size: 16px;
            background: #fafafa;
            transition: 0.3s;
            font-family: inherit;
        }

        .input-group input:focus, .input-group select:focus {
            border-color: var(--primary);
            background: white;
            outline: none;
            box-shadow: 0 0 0 4px rgba(0, 119, 182, 0.1);
        }

        .full-width {
            grid-column: span 2;
        }

        .disease-selection {
            background: #f9fbff;
            padding: 20px;
            border-radius: 16px;
            margin-top: 10px;
        }

        .disease-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .disease-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: white;
            padding: 12px 15px;
            border-radius: 10px;
            border: 1px solid #eee;
            cursor: pointer;
            transition: 0.2s;
        }

        .disease-item:hover {
            border-color: var(--primary);
        }

        .disease-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
        }

        .submit-container {
            margin-top: 40px;
            text-align: center;
        }

        .submit-btn {
            padding: 18px 50px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(0, 119, 182, 0.2);
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 119, 182, 0.3);
            background: #005f92;
        }

        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
            .details-container { padding: 30px 20px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <img src="MEDI-I.png" alt="MEDI-I Logo">
            <div class="logo-text">
                <h1>MEDI-I</h1>
                <p>AI FOR MEDICARE</p>
            </div>
        </div>
        <nav>
            <ul>
                <li><a href="dashboard.html">Dashboard</a></li>
            </ul>
        </nav>
    </header>

    <section class="details-section">
        <div class="details-container">
            <div class="form-header">
                <h2>Build Your Health Profile</h2>
                <p>Complete your details to unlock AI-powered plans and tracking.</p>
            </div>

            <form id="basicDetailsForm">
                <div class="form-grid">
                    <div class="input-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" placeholder="John Doe" required>
                    </div>

                    <div class="input-group">
                        <label for="age">Current Age</label>
                        <input type="number" id="age" placeholder="e.g. 30" required>
                    </div>

                    <div class="input-group">
                        <label for="sex">Gender Identity</label>
                        <select id="sex" required>
                            <option value="">Select</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                            <option value="trans">other</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label for="bmi">Body Mass Index (BMI)</label>
                        <input type="text" id="bmi" placeholder="e.g. 24.5" required>
                    </div>

                    <div class="input-group">
                        <label for="children">Number of Children</label>
                        <input type="number" id="children" placeholder="0" required>
                    </div>

                    <div class="input-group">
                        <label>Smoking Habit</label>
                        <select id="smoker" required>
                            <option value="">Select</option>
                            <option value="no">Non-Smoker</option>
                            <option value="yes">Active Smoker</option>
                        </select>
                    </div>

                    <div class="input-group full-width">
                        <div class="disease-selection">
                            <label>Existing Health Conditions</label>
                            <div class="disease-grid">
                                <label class="disease-item">
                                    <input type="checkbox" name="disease" value="diabetes"> Diabetes
                                </label>
                                <label class="disease-item">
                                    <input type="checkbox" name="disease" value="pressure"> High Blood Pressure
                                </label>
                                <label class="disease-item">
                                    <input type="checkbox" name="disease" value="thyroid"> Thyroid Issues
                                </label>
                                <label class="disease-item">
                                    <input type="checkbox" name="disease" value="asthma"> Asthma
                                </label>
                            </div>
                            <input type="text" id="otherDiseaseInput" placeholder="Other conditions (optional)" style="margin-top: 15px; width: 100%;">
                        </div>
                    </div>

                    <div class="input-group full-width">
                        <label for="preferences">Investment Goal</label>
                        <select id="preferences">
                            <option value="immediateFunds">Immediate Medical Support</option>
                            <option value="shortTermFunds">Short Term Protection (1-3 years)</option>
                            <option value="longTermFunds">Long Term Wealth & Health Focus</option>
                        </select>
                    </div>
                </div>

                <div class="submit-container">
                    <button type="submit" class="submit-btn">Generate My Profile</button>
                </div>
            </form>
        </div>
    </section>

    <footer>
        <p>&copy; 2024 MEDI-I. Secure & Private AI Health Intelligence.</p>
    </footer>

    <script src="basic-details.js"></script>
</body>
</html>
