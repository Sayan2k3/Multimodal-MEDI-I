<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEDI-I | Access Your Health Portal</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0077b6;
            --secondary: #d32f2f;
            --dark: #1a1a1a;
            --light: #f0f8ff;
            --glass: rgba(255, 255, 255, 0.9);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #f0f8ff 0%, #dcf0ff 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .login-section {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .auth-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            padding: 40px;
            border: 1px solid rgba(255,255,255,0.5);
            transition: transform 0.3s ease;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-header h2 {
            font-size: 32px;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 8px;
        }

        .auth-header p {
            color: #666;
            font-size: 14px;
        }

        .tab-group {
            display: flex;
            background: #eee;
            padding: 5px;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            border-radius: 8px;
            font-weight: 600;
            transition: 0.3s;
            color: #777;
        }

        .tab.active {
            background: white;
            color: var(--primary);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group input {
            width: 100%;
            padding: 14px 20px;
            background: #f8f9fa;
            border: 2px solid transparent;
            border-radius: 12px;
            font-size: 16px;
            transition: 0.3s;
        }

        .form-group input:focus {
            border-color: var(--primary);
            background: white;
            outline: none;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background: #005f92;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 119, 182, 0.3);
        }

        .hidden {
            display: none;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .auth-card { padding: 30px 20px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <img src="MEDI-I.png" alt="MEDI-I Logo">
            <div class="logo-text">
                <h1>MEDI-I</h1>
                <p>AI FOR MEDICARE</p>
            </div>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#use-cases">Features</a></li>
            </ul>
        </nav>
    </header>

    <section class="login-section">
        <div class="auth-card">
            <div class="auth-header">
                <h2 id="auth-title">Welcome Back</h2>
                <p id="auth-subtitle">Continue your health journey with MEDI-I</p>
            </div>

            <div class="tab-group">
                <div class="tab active" onclick="toggleAuth('login')">Login</div>
                <div class="tab" onclick="toggleAuth('register')">Register</div>
            </div>

            <form id="authForm">
                <div id="register-fields" class="hidden">
                    <div class="form-group">
                        <input type="text" id="fullname" placeholder="Full Name">
                    </div>
                </div>
                <div class="form-group">
                    <input type="email" id="email" placeholder="Email Address" required>
                </div>
                <div class="form-group">
                    <input type="password" id="password" placeholder="Password" required>
                </div>
                <button type="submit" class="submit-btn" id="submit-btn">Sign In</button>
            </form>
        </div>
    </section>

    <footer>
        <p>&copy; 2024 MEDI-I. Empowering Health with AI.</p>
    </footer>

    <script>
        let currentMode = 'login';

        function toggleAuth(mode) {
            currentMode = mode;
            const title = document.getElementById('auth-title');
            const subtitle = document.getElementById('auth-subtitle');
            const btn = document.getElementById('submit-btn');
            const regFields = document.getElementById('register-fields');
            const tabs = document.querySelectorAll('.tab');

            tabs.forEach(t => t.classList.remove('active'));
            if (mode === 'login') {
                tabs[0].classList.add('active');
                title.innerText = 'Welcome Back';
                subtitle.innerText = 'Continue your health journey with MEDI-I';
                btn.innerText = 'Sign In';
                regFields.classList.add('hidden');
            } else {
                tabs[1].classList.add('active');
                title.innerText = 'Create Account';
                subtitle.innerText = 'Join thousands of users planning better';
                btn.innerText = 'Get Started';
                regFields.classList.remove('hidden');
            }
        }

        document.getElementById('authForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            localStorage.setItem('userLoggedIn', 'true');

            // Special Case for Sayan: Pre-load his existing data
            if (email === 'sayan@gmail.com' && password === '123456') {
                localStorage.setItem('userName', 'Sayan');
                localStorage.setItem('isExistingUser', 'true');
                localStorage.setItem('trackerOnboarded', 'true'); // Sayan skips the form
                
                // Pre-populate Tracker Form Data for Sayan
                const dummyTrackerData = {
                    activity: 'moderate',
                    goal: 'longevity',
                    sleep: '8',
                    stress: 'low',
                    timestamp: new Date().toISOString()
                };
                localStorage.setItem('trackerFormData', JSON.stringify(dummyTrackerData));
                
                // Pre-populate Insurance Data for Sayan
                const dummyData = {
                    name: 'Sayan',
                    age: '28',
                    sex: 'male',
                    bmi: '23.5',
                    smoker: 'no',
                    children: '0',
                    healthIssues: ['none'],
                    preferences: 'longTermFunds'
                };
                localStorage.setItem('insuranceFormData', JSON.stringify(dummyData));
                
                const dummyState = {
                    points: 450,
                    streak: 12,
                    level: 4,
                    goalsCompleted: 2,
                    lastDate: new Date().toLocaleDateString()
                };
                localStorage.setItem('healthEngineState', JSON.stringify(dummyState));
            } else {
                // Normal User Case: Start fresh
                localStorage.setItem('userName', document.getElementById('fullname').value || 'Health Seeker');
                localStorage.setItem('isExistingUser', 'false');
                localStorage.setItem('trackerOnboarded', 'false');
            }
            
            window.location.href = "dashboard.html";
        });
    </script>
</body>
</html>
